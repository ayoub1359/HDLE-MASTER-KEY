<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDLE MASTER ELITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body { 
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #00ff96;
        }

        #main-container {
            background: #050505; border-radius: 25px; border: 2px solid #00ff96;
            box-shadow: 0 0 40px rgba(0, 255, 150, 0.2); width: 95%; max-width: 550px; 
            padding: 30px; text-align: center; position: relative; border-top: 8px solid #00ff96;
        }

        h2 { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; text-shadow: 0 0 15px #00ff96; margin-bottom: 20px; }

        .ad-slot {
            background: transparent; border: none; margin: 15px 0; 
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .section-box {
            background: #080808; border: 1px solid #1a1a1a; border-radius: 15px;
            padding: 20px; margin-bottom: 15px;
        }

        #utc-clock { font-family: 'Orbitron', sans-serif; font-size: 30px; color: #ff3c3c; text-shadow: 0 0 10px #ff3c3c; }

        .btn-link {
            background: linear-gradient(90deg, #ff0055, #ff00aa); border-radius: 10px; color: white; display: inline-block;
            padding: 18px; text-decoration: none; width: 90%; font-weight: bold; font-size: 16px; box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
        }

        #generate-btn {
            background: #111; border: 1px solid #222; color: #333;
            font-size: 20px; font-weight: bold; padding: 22px; width: 100%;
            cursor: not-allowed; border-radius: 12px; transition: 0.5s; font-family: 'Orbitron', sans-serif;
        }

        #adblock-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="main-container">
    <!-- شاشة الحماية ضد AdBlock -->
    <div id="adblock-screen">
        <span style="font-size:80px;color:#ff3c3c">⚠️</span>
        <h2 style="color:#ff3c3c;margin-top:20px">مانع الإعلانات نشط</h2>
        <p style="color:#bbb;padding:0 40px;">يرجى تعطيله وتحديث الصفحة للحصول على المفتاح.</p>
        <button onclick="location.reload()" style="background:#ff3c3c;color:white;border:none;padding:15px 35px;border-radius:10px;cursor:pointer;font-weight:bold;margin-top:25px">إعادة المحاولة</button>
    </div>

    <h2>MASTER SYSTEM ELITE</h2>

    <!-- الإعلان الجديد رقم 1 (العلوي) -->
    <div class="ad-slot">
        <script src="https://fundingfashioned.com/56/ca/42/56ca42de57c88b107ae373db6cd5ac72.js"></script>
    </div>
    
    <!-- ساعة الـ UTC -->
    <div class="section-box" style="border-right: 5px solid #ff3c3c;">
        <div style="font-size:11px;color:#555;margin-bottom:8px">تحديث المفتاح القادم (UTC):</div>
        <div id="utc-clock">00:00:00</div>
    </div>

    <!-- الخطوة 1 -->
    <div class="section-box">
        <p style="color:#aaa;font-size:13px;margin-bottom:15px">1. قم بالضغط على الرابط التالي 4 مرات لتفعيل الزر:</p>
        <a href="https://fundingfashioned.com/c7509xzhyt?key=a267143d0fb6343546f07eb4d3e5d284" onclick="window.registerClick();" target="_blank" class="btn-link">🔗 تفعيل رابط النقاط</a>
        <div style="margin-top:15px; font-weight:bold; font-size: 18px;">النقاط: <span id="click-status">0</span> / 4</div>
    </div>

    <!-- الخطوة 2 ومنطقة الفحص -->
    <div class="section-box" id="advertisement-area">
        <div id="status-text" style="font-size:11px;color:#555;margin-bottom:10px">🛡️ جاري فحص سلامة الإعلانات...</div>
        
        <!-- فخ AdBlock -->
        <div class="adsbygoogle" id="ad-detector-trap" style="height:1px; width:1px;"></div>

        <!-- الإعلان الجديد رقم 2 (الـ Iframe الأوسط) -->
        <div style="min-height: 250px; display:flex; justify-content:center; align-items:center; background:#000; border-radius:10px; margin-bottom:15px;">
            <script>
              atOptions = {
                'key' : '0e4c2a3b5881e334c05cef8a6c825c1a',
                'format' : 'iframe',
                'height' : 250,
                'width' : 300,
                'params' : {}
              };
            </script>
            <script src="https://fundingfashioned.com/0e4c2a3b5881e334c05cef8a6c825c1a/invoke.js"></script>
        </div>

        <div style="color:#ff3c3c;font-size:20px;font-weight:bold;">⏳ متبقي للمشاهدة: <span id="timer">30</span> ثانية</div>
    </div>

    <!-- زر التوليد -->
    <button disabled id="generate-btn" onclick="window.runGenerator();">نظام المفاتيح مغلق</button>

    <!-- مكان عرض المفتاح -->
    <div id="key-display" style="display:none; background: #000; border: 2px dashed #00ff96; padding: 20px; margin-top: 20px; color: #fff; word-break: break-all; font-family: monospace; border-radius: 10px; font-size:18px;"></div>
    <button id="copy-btn" onclick="window.copyKey();" style="display:none; background:transparent; border:1px solid #00ff96; color:#00ff96; padding:15px; width:100%; margin-top:10px; cursor:pointer; border-radius:10px; font-weight:bold;">نسخ المفتاح</button>

    <!-- الإعلان الجديد رقم 3 (السفلي) -->
    <div class="ad-slot">
        <script src="https://fundingfashioned.com/a8/29/ee/a829eed37a40a18f9d50aef268bf7656.js"></script>
    </div>
</div>

<script>
(function(){
    var c=0, tDone=false, tl=30, ab=false, salt="HDLE_PRO_99_STRIKE";
    
    window.registerClick = function(){ c++; document.getElementById('click-status').innerText=c; upd(); };

    function upd() {
        var b = document.getElementById('generate-btn');
        if(c>=4 && tDone) {
            b.disabled=false; b.style.background="#00ff96"; b.style.color="#000"; b.style.boxShadow="0 0 25px #00ff96"; b.innerText="توليد المفتاح الآن"; b.style.cursor="pointer";
        } else {
            b.innerText = (c<4) ? "باقي " + (4-c) + " ضغطات" : "انتظر انتهاء المشاهدة...";
        }
    }

    function clock() {
        setInterval(function(){
            var n=new Date();
            var h=23-n.getUTCHours(), m=59-n.getUTCMinutes(), s=59-n.getUTCSeconds();
            document.getElementById('utc-clock').innerText=(h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
        }, 1000);
    }

    function checkAB() {
        setTimeout(function(){
            var trap = document.getElementById('ad-detector-trap');
            var container = document.getElementById('advertisement-area');
            if(!trap || trap.offsetHeight===0 || !container.querySelector('iframe')) {
                ab=true; document.getElementById('adblock-screen').style.display='flex';
            } else {
                document.getElementById('status-text').innerText="🛡️ تم التحقق من الإعلانات: نشط";
                document.getElementById('status-text').style.color="#00ff96";
            }
        }, 8000);
    }

    function timer() {
        var itv = setInterval(function(){
            if(!ab) {
                tl--; document.getElementById('timer').innerText=tl;
                if(tl<=0) { clearInterval(itv); tDone=true; document.getElementById('timer').parentElement.innerHTML="✅ تم إكمال المشاهدة!"; upd(); }
            }
        }, 1000);
    }

    window.runGenerator = function() {
        if(c<4 || !tDone) return;
        var d=new Date(), dy=d.getUTCDate(), mo=d.getUTCMonth()+1, yr=d.getUTCFullYear();
        var str = dy.toString()+mo.toString()+yr.toString()+salt;
        var sd = 0n;
        for(var i=0; i<str.length; i++){ sd += BigInt(str.charCodeAt(i))*BigInt(i+1); }
        var charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
        var k = "";
        for(var i=0; i<16; i++){
            sd = (sd * 1664525n + 1013904223n) % 4294967296n;
            k += charset.charAt(Number(sd % BigInt(charset.length)));
        }
        document.getElementById('key-display').innerText = k;
        document.getElementById('key-display').style.display = 'block';
        document.getElementById('copy-btn').style.display = 'block';
    };

    window.copyKey = function() {
        navigator.clipboard.writeText(document.getElementById('key-display').innerText);
        alert("تم نسخ المفتاح بنجاح!");
    };

    window.onload = function(){ clock(); checkAB(); timer(); };
})();
</script>
</body>
</html>
